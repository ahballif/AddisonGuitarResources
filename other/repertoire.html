<!DOCTYPE html>
<html>
<head>
    <title>Guitar Repertoire</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="icon" type="image/png" href="../art/180630.png">
</head>
<body>
    <h1>Repertoire</h1>
    <div id="fileLinks"></div>

    <h2>Links to other internet sources</h2>
    <ul>
    <li><a href="https://www.boltonguitar.co.uk/workspace/uploads/tab/minuet-in-d-major-op11-fernan-5bfc0670006d2.pdf">minuet-in-d-major-fernan-boltonguitar</a></li>
    <li><a href="https://www.classclef.com/pdf/sor-op11-5.pdf">minuet-in-d-major-fernan-classclef-tab</a></li>
    <li><a href="https://www.classclef.com/source/sor-op11-5.pdf">minuet-in-d-major-fernan-classclef-note</a></li>
    </ul>

    <script>
        // List of files in this directory (excluding this file)
        const files = [
            'aFineRomance.pdf',
            'anthropology.pdf',
            'blackberryBlossom.pdf',
            'crippleCreek.pdf',
            'jesustheverythoughtofthee.pdf',
            'liberty.pdf',
            'recordame.pdf'
        ];

        // Sort alphabetically
        files.sort();

        // Create links and insert into page
        const container = document.getElementById('fileLinks');
        const list = document.createElement('ul');

        files.forEach(file => {
            const li = document.createElement('li');
            const link = document.createElement('a');
            link.href = file;
            link.textContent = file;
            li.appendChild(link);
            list.appendChild(li);
        });

        container.appendChild(list);
    </script>
</body>
</html>
